name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./internal/... ./cmd/... ./tests/e2e/... -race -timeout 120s

  build-tests:
    name: Build Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Cross-compile checks
        run: go test ./tests/build/... -run TestBuild -timeout 10m
      - name: No-CGO check
        run: go test ./tests/build/... -run TestNoCGO -timeout 2m

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Start WireMock servers
        run: docker compose -f docker-compose.test.yml up -d
      - name: Wait for health checks
        timeout-minutes: 2
        run: |
          until curl -sf http://localhost:8080/__admin/health; do sleep 1; done
          until curl -sf http://localhost:8081/__admin/health; do sleep 1; done
      - name: Run integration tests
        run: |
          REVIEWBRIDGE_GITHUB_BASE_URL=http://localhost:8080 \
          REVIEWBRIDGE_GITLAB_BASE_URL=http://localhost:8081 \
          go test ./tests/integration/... -v -timeout 120s
      - name: Stop WireMock servers
        if: always()
        run: docker compose -f docker-compose.test.yml down

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint, security, unit-tests, build-tests, integration-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - name: Build release binaries
        run: make release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
