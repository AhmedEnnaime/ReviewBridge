services:
  mock-github:
    image: wiremock/wiremock:latest
    ports:
      - "8080:8080"
    volumes:
      - ./tests/mocks/github:/home/wiremock/mappings
    command: --verbose --local-response-templating
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/__admin/health"]
      interval: 2s
      timeout: 5s
      retries: 10

  mock-gitlab:
    image: wiremock/wiremock:latest
    ports:
      - "8081:8080"
    volumes:
      - ./tests/mocks/gitlab:/home/wiremock/mappings
    command: --verbose --local-response-templating
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/__admin/health"]
      interval: 2s
      timeout: 5s
      retries: 10
